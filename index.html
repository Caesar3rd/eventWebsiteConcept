<!DOCTYPE html>
<html>
    <head>
        <title>VAMP NIGHT | HOMEPAGE</title>
        <link rel="stylesheet" href="../css/index.css">
    </head>
    <body>
        <div class="tot">
            <div id="days" class="tempo"></div>
            <span>:</span>
            <div id="hours" class="tempo"></div>
            <span>:</span>
            <div id="minutes" class="tempo"></div>
            <span>:</span>
            <div id="seconds" class="tempo"></div>
        </div>
        <div id="menu">
            <a href="/src/html/index.html"><img src="../../Images/logoHome.png"></a>
            <a href="/src/html/info.html">INFO</a>
            <a href="/src/html/curiosita.html">CURIOSITA'</a>
        </div>

        <script>
            const target = new Date("2026-07-02T00:00:00");

            const interval = setInterval(() => {
            const diff = target - new Date();
            if (diff <= 0){ clearInterval(interval); return; }

                document.getElementById("days").textContent    = Math.floor(diff / 86400000);
                document.getElementById("hours").textContent   = Math.floor((diff % 86400000) / 3600000);
                document.getElementById("minutes").textContent = Math.floor((diff % 3600000) / 60000);
                document.getElementById("seconds").textContent = Math.floor((diff % 60000) / 1000);
            }, 1000);
  </script>

    </body>


</html>
